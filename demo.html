<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoSlider — 組み込みデモ</title>
  <link rel="stylesheet" href="photo-slider.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    .demo-header {
      padding: 2rem;
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      color: #aaa;
    }
    .demo-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1rem 2rem;
    }
    .ps-demo-controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 1rem 0;
    }
    .ps-demo-btn {
      padding: 0.5rem 1.8rem;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    .ps-demo-btn:hover { background: rgba(255,255,255,0.2); }
    .demo-info {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.05);
      border-left: 3px solid #555;
      font-size: 0.8rem;
      color: #888;
      line-height: 1.6;
    }
    .demo-info code { color: #a0c4ff; }
  </style>
</head>
<body>

  <div class="demo-header">PhotoSlider — 組み込みデモ</div>

  <div class="demo-wrap">
    <div id="my-slider"></div>
    <div class="ps-demo-controls">
      <button class="ps-demo-btn" id="btn-prev">← 前へ</button>
      <button class="ps-demo-btn" id="btn-next">次へ →</button>
    </div>
    <div class="demo-info">
      スライド数: <code id="slide-count">-</code> 件 ／
      スライドの追加・削除は <code>slides-config.js</code> を編集してください。<br>
      <code>window._slider.destroy()</code> で停止 ／
      <code>window._slider._getState()</code> で現在状態を確認。
    </div>
  </div>

  <!-- 設定ファイル（スライドの追加・削除はここだけ編集） -->
  <script src="slides-config.js"></script>

  <!-- スライダー本体 -->
  <script src="photo-slider.js"></script>

  <script>
    /* slides-config.js の内容を検証して上限チェック */
    var config = PHOTO_SLIDER_CONFIG;

    if (!config || !Array.isArray(config.slides) || config.slides.length === 0) {
      console.error('[PhotoSlider] slides-config.js のスライドが空です。');
    } else if (config.slides.length > 100) {
      console.warn('[PhotoSlider] スライドは最大100件です。101件目以降は無視されます。');
      config.slides = config.slides.slice(0, 100);
    }

    /* スライド件数を表示 */
    document.getElementById('slide-count').textContent = config.slides.length;

    /* 初期化 */
    var slider = PhotoSlider.init({
      mountElement: '#my-slider',
      slides:       config.slides,
      autoPlay:     config.autoPlay
    });

    window._slider = slider;

    document.getElementById('btn-next').addEventListener('click', function () { slider.next(); });
    document.getElementById('btn-prev').addEventListener('click', function () { slider.prev(); });
  </script>

</body>
</html>
