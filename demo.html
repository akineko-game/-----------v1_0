<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoSlider — 組み込みデモ</title>
  <link rel="stylesheet" href="photo-slider.css">
  <style>
    /* ===== デモページ専用スタイル（既存HPのCSSを想定） ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }
    .demo-header {
      padding: 2rem;
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      color: #aaa;
    }
    .demo-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1rem 2rem;
    }

    /* ===========================================================
       [Undefined] 矢印ボタンの有無: 未確定。
       以下は「仮ボタン」として設置したデモ用UIです。
       本番実装時は削除またはデザイン確定後に置き換えてください。
       =========================================================== */
    .ps-demo-controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 1rem 0;
      /* ↑ [Undefined] 矢印ボタンUI: 仮実装。確定後に置き換えること */
    }
    .ps-demo-btn {
      padding: 0.5rem 1.8rem;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    .ps-demo-btn:hover { background: rgba(255,255,255,0.2); }

    .demo-info {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.05);
      border-left: 3px solid #555;
      font-size: 0.8rem;
      color: #888;
      line-height: 1.6;
    }
    .demo-info code { color: #a0c4ff; }
  </style>
</head>
<body>

  <div class="demo-header">PhotoSlider — 組み込みデモ</div>

  <div class="demo-wrap">

    <!-- ① スライダーのマウント先。既存HPではここにdivを配置するだけでよい -->
    <div id="my-slider"></div>

    <!--
      [Undefined] 矢印ボタンの有無: 未確定のため仮ボタンを設置。
      本番実装時はデザイン確定後に差し替えること。
    -->
    <div class="ps-demo-controls" id="ps-controls">
      <button class="ps-demo-btn" id="btn-prev">← 前へ</button>
      <button class="ps-demo-btn" id="btn-next">次へ →</button>
    </div>

    <div class="demo-info">
      コンソールに状態遷移ログが出力されます。<br>
      <code>window._slider.destroy()</code> で停止 /
      <code>window._slider._getState()</code> で現在状態を確認できます。<br>
      <strong>[Undefined]</strong> ドットナビゲーション: 未実装 /
      スマホ表示: 未確定 /
      矢印ボタンUI: 仮実装
    </div>

  </div>

  <script src="photo-slider.js"></script>
  <script>
    /**
     * ② PhotoSlider.init を呼ぶ。
     *    slides にサンプルデータを渡す。
     *    [Undefined] データの供給方法: JS配列を暫定採用。
     *
     *    サンプル画像は Unsplash の oEmbed URL を使用。
     *    実際の組み込み時は自サイトの画像URLに差し替えること。
     */
    var slider = PhotoSlider.init({
      mountElement: '#my-slider',
      slides: [
        {
          imageSrc: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=860&q=80',
          caption:  '山の夜明け — 稜線から差し込む最初の光が、谷をゆっくりと照らしていく。'
        },
        {
          imageSrc: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=860&q=80',
          caption:  '森の霧 — 早朝の静寂の中、木々の間から光が筋となって落ちてくる。'
        },
        {
          imageSrc: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=860&q=80',
          caption:  '海岸の夕暮れ — 波が砂を引いていくたびに、空の色が変わっていく。'
        },
        {
          imageSrc: 'https://images.unsplash.com/photo-1418065460487-3e41a6c84dc5?w=860&q=80',
          caption:  '秋の渓谷 — 赤と黄が混じり合う木々の間を、流れが静かに走る。'
        }
      ],
      autoPlay: {
        enabled:  false, // [Undefined] AutoPlayTimer.enabled 初期値: false 暫定。true にすると自動再生
        interval: 5000   // [Undefined] AutoPlayTimer.interval 具体値: 5000ms 暫定
      }
    });

    // デバッグ用: コンソールからアクセスできるよう window に保持
    window._slider = slider;

    /* ===================================================
       [Undefined] 矢印ボタンの有無: 未確定のため仮接続。
       ボタンUIが確定したら以下を差し替えること。
       =================================================== */
    document.getElementById('btn-next').addEventListener('click', function () {
      slider.next();
    });
    document.getElementById('btn-prev').addEventListener('click', function () {
      slider.prev();
    });
  </script>

</body>
</html>
